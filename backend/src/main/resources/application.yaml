server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:user}
    password: ${RABBITMQ_DEFAULT_PASS:password}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:jobs}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

rabbitmq:
  queue: ${RABBITMQ_QUEUE:jobs}

allowedOrigin:
  url: ${ALLOWED_ORIGIN_URL:http://localhost:3000}